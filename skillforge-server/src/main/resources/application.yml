server:
  port: 8080

spring:
  application:
    name: skillforge

  datasource:
    # embedded-postgres 启动后会覆盖此 URL，此处作为外部 PG 的备用配置
    url: jdbc:postgresql://localhost:15432/skillforge
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway 管 schema，JPA 只做校验
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    # OBS-1 W-R3-N2-b: server 部署假定 UTC (spring.jackson.time-zone=UTC + user.timezone=UTC)。
    # SubagentSessionResolver 用 ZoneId.systemDefault() 转 Instant→LocalDateTime；
    # 跨时区部署需要在 JVM 启动加 -Duser.timezone=UTC，确保 createdAt 比较正确。
    time-zone: UTC
    # OBS-1 footgun #6 hardening: tolerate unknown JSON fields so a future provider /
    # legacy payload field rename does not crash deserialization in observer paths.
    deserialization:
      fail-on-unknown-properties: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # 首次迁移时自动 baseline
    # OPT-REPORT-V1.2 r2: ignore "deleted" markers left over from an earlier
    # mistaken `mvn flyway:repair` against skillforge-server alone (which
    # didn't see skillforge-observability's V33/V45/V51 .sql files and marked
    # those rows DELETED). Those migrations *are* applied in DB — patterns
    # below let Flyway proceed without re-validating.
    ignore-migration-patterns: "*:missing"
    validate-on-migrate: false

# AUTOEVOLVING V1 Sprint 3 (Task F, soft-point ①): route OPT-REPORT through the
# `opt-report` DSL workflow instead of the agent-driven report-generator path.
# Default false → legacy OPT-REPORT-V1 path runs byte-for-byte unchanged (zero
# regression). Dogfood flips it true to exercise the DSL port. Read by
# OptReportService.startReport via @Value("${flywheel.opt-report.use-workflow:false}").
flywheel:
  opt-report:
    use-workflow: false

# SkillForge configuration
skillforge:
  # DESKTOP-MACOS-PACKAGE D2: when set, SpaStaticConfig serves the built dashboard
  # SPA from this filesystem dir (same-origin → FE needs zero changes). UNSET by
  # default → bean inactive → dev behaviour unchanged (server serves no static SPA).
  # The desktop launcher passes --skillforge.spa.root=<App>/Contents/Resources/web.
  # spa:
  #   root: /absolute/path/to/dashboard/dist
  workspace:
    root: ${SKILLFORGE_WORKSPACE_ROOT:${SKILLFORGE_ACP_REPO_ROOT:}}
    max-preview-bytes: 262144
    max-entries-per-directory: 500
  acp:
    # ACP-EXTERNAL-AGENT worktree mode (option A): the git repo cc works on. When
    # set, each cc run executes in a fresh `git worktree` of this repo on its own
    # branch (acp/cc-<sub-session-id>), so cc edits the REAL codebase isolated to a
    # reviewable branch. Blank (default) → legacy throwaway empty temp dir.
    # Machine-specific → supplied via env, not hardcoded here.
    repo-root: ${SKILLFORGE_ACP_REPO_ROOT:}
    # Parent dir for per-run worktrees (MUST be OUTSIDE repo-root). Blank → OS temp.
    worktree-root: ${SKILLFORGE_ACP_WORKTREE_ROOT:}
    # Commit-ish each run's branch is based on. Default origin/main → cc branches
    # off the latest remote main (best-effort fetched first), so its PR diffs cleanly
    # against main. Use HEAD to base on the current local checkout instead.
    worktree-base-ref: ${SKILLFORGE_ACP_WORKTREE_BASE_REF:origin/main}
  websearch:
    # WEB-TOOLS-HARDENING V1: provider priority chain.
    # Ordered fallback list: try Tavily first, then Exa, then DuckDuckGo HTML.
    # API providers whose api-key is blank are skipped automatically.
    backend-priority:
      - tavily
      - exa
      - duckduckgo
    tavily:
      api-key: ${TAVILY_API_KEY:}
    exa:
      api-key: ${EXA_API_KEY:}

  webfetch:
    robots:
      # Operator-managed robots bypass for trusted local/internal hosts.
      # Do not expose bypass_robots to agents by default.
      host-allowlist:
        - localhost
        - 127.0.0.1

  mobile:
    push:
      # Base64-encoded 32-byte AES key protecting APNs device tokens at rest.
      encryption-key: ${SKILLFORGE_MOBILE_PUSH_ENCRYPTION_KEY:}
      poll-ms: ${SKILLFORGE_MOBILE_PUSH_POLL_MS:10000}
      initial-delay-ms: ${SKILLFORGE_MOBILE_PUSH_INITIAL_DELAY_MS:15000}
      apns:
        team-id: ${SKILLFORGE_APNS_TEAM_ID:}
        key-id: ${SKILLFORGE_APNS_KEY_ID:}
        topic: ${SKILLFORGE_APNS_TOPIC:com.skillforge.companion.dev}
        # Multiline .p8 PEM or a value whose newlines are escaped as \n.
        private-key: ${SKILLFORGE_APNS_PRIVATE_KEY:}

  # P11 MCP-CLIENT: feature flag for the MCP client subsystem.
  # true (default) → McpServerLifecycle starts enabled servers from t_mcp_server on boot,
  # listens to CRUD events, exposes mcp_<server>_<tool> tools per agent.mcp_server_ids.
  # false → no MCP servers spawned; existing agents see no mcp_* tools (INV-4 default).
  mcp:
    enabled: true
  # OBS-1: LLM trace observability (plan §3.4 / §6.2 / §10.1)
  observability:
    blob:
      root: ./data/llm-payloads        # FileSystemBlobStore root
      read-concurrency: 20             # Semaphore for /spans/{id}/blob (R3-WN3)
    retention:
      cron: "0 30 3 * * *"             # daily 03:30 — drop blobs/spans older than 30d
    etl:
      legacy:
        mode: off                       # off | flyway | java (R2-W5)
                                        # 2026-04-29: one-shot ETL completed under
                                        # mode=flyway (V36 deduped + R__ has NOT EXISTS
                                        # guard). Switched back to off so subsequent
                                        # restarts don't re-run the migration.
        qwen-displayname: bailian      # bailian | dashscope (R2-B4 §3.3)
      trace_span:
        mode: off                       # off | flyway (OBS-2 §M2)
                                        # Switching to 'flyway' triggers Flyway re-run of
                                        # R__migrate_legacy_trace_span (placeholder hash
                                        # changes), which migrates t_trace_span TOOL_CALL +
                                        # 4 event types into t_llm_span (kind=tool/event,
                                        # source='legacy') and backfills lifecycle/aggregate
                                        # fields on existing legacy t_llm_trace rows.
                                        # After verifying counts in dev DB, revert to 'off'
                                        # so subsequent restarts don't re-run.

  # FLYWHEEL-LOOP-CLOSURE Phase 1.3 (2026-05-16): auto-trigger A/B run on
  # candidate_ready stage transition. Closes缺口 B+C — without this, attribution
  # approve → candidate_ready sits idle waiting for an operator to manually click
  # "Run A/B". Read by @ConditionalOnProperty on OptimizationEventAutoTriggerListener
  # — false skips the listener bean entirely (no event delivery, no auto-trigger).
  #
  # AUTOEVOLVE-AGENT-FLYWHEEL Module C (FR-C6): the agent-driven evolve
  # orchestrator (EvolveController → evolve-orchestrator agent) drives its own
  # report→candidate→A/B→gate loop. To avoid the old event-driven flywheel racing
  # it on the same agent (two編排 over one agent → ImprovementConflictException /
  # divergence), set
  #   skillforge.flywheel.auto-trigger-ab-on-candidate-ready: false
  # in the DOGFOOD profile (e.g. application-dogfood.yml) while running the
  # orchestrator. Default stays true here (no behavior change for the existing
  # event-driven flywheel); flip it off only in the profile that runs evolve.
  flywheel:
    auto-trigger-ab-on-candidate-ready: true
    ab-eval:
      # Per-scenario timeout for the agent run inside A/B eval (baseline +
      # candidate sides each). Old hardcoded 30s killed 7/12 scenarios in
      # Event 122 V108-verify — too short for realistic multi-turn LLM agents
      # (single LLM call up to 20s × ~3 turns + tool calls = 60-90s baseline).
      # 120s gives 2× headroom while still bounding worst-case AB pipeline at
      # ~24min (12 scenarios × 2 sides). Override per env if needed.
      scenario-timeout-ms: 300000   # 2026-06-02: 120000→300000（火山 deepseek-v4-flash 推理慢，120s 一半场景 CONTEXT_OVERFLOW 超时；给到 5min 让多轮 agent loop 跑完）
      # AUTOEVOLVE-AGENT-FLYWHEEL: cap scenarios per A/B run (0 = full ~49-scenario
      # dataset). The attribution/evolve path re-evaluates baseline+candidate on
      # every scenario each iteration, so the full set makes one A/B ~10-15 min and
      # multiplies provider load (→ 429s) — impractical for a multi-iteration loop.
      # A 12-scenario sample gives a directional pass-rate signal in ~1/4 the time
      # and calls; the human reviews the trajectory before adopting.
      max-scenarios: 12
      # Parallel scenarios per A/B. KEEP LOW on a rate-limited provider: higher =
      # more concurrent calls = more HTTP 429s (counterproductive).
      # 2026-06-05: 3→6 给 A/B 提速（~24 次沙箱 agent loop / 原并发 3 = 8 波串行太慢，
      # 一轮 A/B 15-30min）。ark 配额够时可承受 6 并发；若 429 频发再降回。
      # 2026-06-05 二次提速: 6→10。实测 run 5eb9c71e A/B 段(50场景×2臂=100 loop @ 并发6)
      # = 11.4min、整窗口 0 个 429（ark 充足余量）→ 安全翻倍。预期 A/B ~11.4→~7min。
      # 若后续 429 频发再降回 6。
      scenario-concurrency: 10

  # AUTOEVOLVE-AGENT-FLYWHEEL Module C (FR-C7): per-agent A/B budget cap.
  # The orchestrator's maxIter lives in its agent prompt (untrusted surface) and
  # the engine's maxLoops=25 fallback is too loose for real A/B compute. The cap is
  # enforced per-agent (keyed on the always-required targetAgentId) over a ROLLING
  # TIME WINDOW: the tool counts evolve_iteration steps recorded for the agent
  # within the last ab-budget-window-hours and rejects once they reach
  # ab-budget-per-run. Default 30 triggers / 168h (7d).
  #
  # 2026-06-24 FR-C7 fix: the count used to be lifetime-cumulative, which
  # permanently froze any repeatedly-evolved agent once it crossed the cap (agent 3
  # hit this). The rolling window resets the budget each window while still counting
  # per-agent — the CRIT-1 cross-run bypass guard still holds inside the window.
  # ab-budget-window-hours valid range is [1, 8760] (1h .. 1 year); an out-of-range
  # value warns + falls back to 168 (a huge/lifetime window would re-create the
  # freeze; see FlywheelRunService.normalizeWindowHours).
  evolve:
    ab-budget-per-run: 30
    ab-budget-window-hours: 168
    # AUTOEVOLVE-CLOSE-LOOP workflow-fix F5 (2026-06-07): promote/keep 阈值单一来源
    # (EvolveThresholdProperties)。prompt/skill delta 15→5（n=36 时 15pp≈5-6 个净翻转,
    # 结构性不可达）; agent 双标准 0/−3 值不变挪配置; min-measured-n=10 (F3 最小测量数
    # 守卫); anchor-erosion-floor-pp=5 (F6 vs-original 锚点)。behavior_rule 面 (+10/−3)
    # 本期不动。GetAbResult 将生效值随 agent 面响应回显 (thresholds 子对象), workflow JS
    # 不写死第二份。
    thresholds:
      prompt-delta-pp: 5
      skill-delta-pp: 5
      skill-min-candidate-rate-pp: 40
      agent-target-min-delta-pp: 0
      agent-regression-floor-pp: -3
      min-measured-n: 10
      anchor-erosion-floor-pp: 5
      # EVOLVE-LOOP-HILLCLIMB 阶段 A: weightedScore = wG*generalPassRate + wH*harvestPassRate
      # (按在场子集重归一; harvest 子集空 → 退化为纯大盘 generalPassRate)。
      weight-general: 0.6
      weight-harvest: 0.4
      min-improve-pp: 0          # keep 防 temp=0 噪声: 候选 weightedScore 须 > best + 此值
      no-improve-streak-limit: 3 # 收敛停: 连续 N 轮无新 best 即停
      # target-weighted-score:   # 留空=不靠达标停(纯爬坡); 设 [0,100] 则达标即停
      # EVOLVE-JUDGE-GROUNDING Phase 1: 配对 net-wins 主判据 (weightedScore 降 advisory)。
      # keep ⟺ netWins(=improvedTotal-regressedTotal) >= min-net-wins [+ 可选符号检验]。
      min-net-wins: 2            # 先松后紧: 默认 2, 按历史回放校准 (n=18~36 不一致对常个位数)
      pairwise-sign-test: false  # 可选更严闸: 开则额外要两侧符号检验过 pairwise-alpha (默认关)
      pairwise-alpha: 0.05       # 仅当 pairwise-sign-test=true 时生效, (0,1)
    # AUTOEVOLVE-CLOSE-LOOP Phase BC: repo-root prefix BadCaseHarvestService strips
    # from harvested span paths so fixtures become sandbox-relative and the task
    # is rebased to /tmp/eval/. The @Value default is a dev-machine path; override
    # to your checkout root in non-dev hosts (trailing slash optional). If it
    # doesn't resolve to a real directory, the service log.warns at startup.
    # harvest:
    #   repo-root: <your-checkout-root>/

  session-message-store:
    row-read-enabled: true
    row-write-enabled: true
    dual-read-verify-enabled: false
    backfill-enabled: true
    max-backfill-sessions-per-startup: 300

  # MULTIMODAL: chat attachment storage + ATTACHMENT-CLEANUP cron (Wave1-B).
  #
  # `root` was previously inlined as the @Value default in ChatAttachmentService;
  # surfaced here so ops can override without recompiling.
  #
  # The cleanup cron drops:
  #   (1) DB rows status='uploaded' AND seq_no IS NULL AND created_at < now - threshold-hours
  #       (users uploaded then closed the page without sending), and
  #   (2) physical files under root that have no DB row (orphaned by session
  #       ON DELETE CASCADE).
  # Manual trigger: POST /api/chat/admin/chat-attachments/cleanup?...&dryRun=true|false.
  chat:
    attachments:
      root: ./data/chat-attachments
      cleanup:
        enabled: true
        cron: "0 0 4 * * *"           # daily 04:00, after 03:00/03:30 memory crons
        threshold-hours: 24

  # V5 EVAL-DYNAMIC-USER-SIM Phase 1.2 — 5 fixed personas + max-turns + reasoning-model
  # tokens budget. The 5 persona strings are ratify-locked: orchestrator passes one of
  # these (or a custom one via SDK override) into UserSim system prompt template.
  # max-tokens=4096: Phase 1.0 footgun — mimo-v2.5-pro reasoning model needs ≥4000
  # budget; below this the thinking + tool-call iteration gets truncated.
  eval:
    user-simulator:
      personas:
        - "销售经理急性子 — 短句催进度、商业语言、不耐烦细节"
        - "数据分析师细心 — 多确认、问细节、追究边界条件"
        - "CEO 高高在上 — 命令式、不解释、只要结果"
        - "实习生小白 — 问基础概念、需要铺垫、抓不准重点"
        - "DBA 老手 — 跳过初级解释、直接问深问题、对效率敏感"
      max-turns: 10
      max-tokens: 4096
      turn-timeout-ms: 60000  # 2026-05-16: 25s 对 mimo-v2.5-pro reasoning model 太紧, bump to 60s
      trial-budget-ms: 300000  # 2026-05-16: 10 turn × 60s ≈ 600s 上限, dogfood 用 300s 平衡 budget

  # P9-5 post-compact recovery: after a full compact, append a recovery payload (recently-read
  # file heads) so the LLM does not "lose" file context.  enabled=false skips emission while
  # keeping the FileStateCache hot (cheap; per-session mem only).
  compact:
    # COMPACT-IDEMPOTENCY-BOUNDARY-FIX 存储重构 go-live (2026-06-19)：范围摘要表派生模型视图
    # （append-only 真相 / 压缩不写消息行不复制 / 读时派生 [滚动摘要]+尾巴）。验证：c16d2963
    # 手动 /compact → summary [0,148] 零膨胀 61374→10471 token、对账无破坏。
    # 回滚：设 false → 回退旧 boundary-slice 行为（存量数据不丢，per-session 双读兼容老会话）。
    range-model:
      enabled: true
    recovery:
      enabled: true
      max-files: 5
      max-tokens-per-file: 5000
  # REMINDER-MVP: <system-reminder> framework + reminder sources.
  # PRD D5 default cadence — Context every turn (≥70%); Memory every 5 turns (>7d stale);
  # Todo every turn when TodoWrite has state; File every 5 turns (top-5 files older than 30s).
  # Source order is fixed in code (ContextUsage → TodoList → MemoryAge → FileActivity)
  # under a shared 5K token budget.
  reminder:
    enabled: true                      # global master switch
    total-budget-tokens: 5000          # cumulative per-turn budget across sources
    memory-age:
      enabled: true
      interval-turns: 5
      stale-days-threshold: 7
    context-usage:
      enabled: true
      interval-turns: 1
      pct-threshold: 70
    todo-list:
      enabled: true
      interval-turns: 1
      max-todos: 20
    file-activity:
      enabled: true
      interval-turns: 5
      max-files: 5
      min-age-seconds: 30
  # SKILL-EVOLVE-LOOP feature flags (INV-1, default true; flip to false to keep
  # the cron beans alive but skip work on each tick — see Phase 1 / 3 / 5
  # docstrings).
  skill-extraction:
    scheduled-enabled: true
  skill-evaluation:
    scheduled-enabled: true
  skill-self-improve:
    # Phase 5 cron 0 0 5 * * TUE — auto-evolve skills with composite_score
    # below score-threshold. Listens on SkillAbCompletedEvent for WS push.
    scheduled-enabled: true
    # INV-4 — latest composite_score < this triggers an evolve. Aligned with
    # SkillEvolutionService.FAILURE_COMPOSITE_THRESHOLD so the failures we
    # surface to the LLM are the same ones that justified the evolve.
    score-threshold: 60.0
  # SKILL-IMPORT — whitelist for the ImportSkill agent tool. Each entry is a
  # filesystem prefix that sourcePath must start with (after symlink resolution).
  # Leading "~" expands to the JVM user.home. Add new roots + restart to enable
  # additional marketplace CLIs (no code change required).
  skill-import:
    allowed-source-roots:
      - "~/.openclaw/workspace/skills"
  # SKILL-SECURITY-SCAN — fast static scan at ImportSkill / batch import time.
  # No network calls and no model audit in the default path.
  skill-security-scan:
    enabled: true
    allow-medium-risk-by-default: false
    max-file-bytes: 262144
    max-total-bytes: 1048576
  # Skill packages storage path.
  # P1-D (2026-04-30): runtime path is now resolved by SkillForgeHomeResolver
  # (env var SKILLFORGE_HOME or auto-detect project root → <projectRoot>/skillforge-server).
  # This `skills-dir` value is retained for backward compatibility (older tests use
  # SkillService#setSkillsDir / SkillDraftService#setSkillsDir to override it directly),
  # but production runtime ignores it — SkillStorageService/UserSkillLoader use
  # SkillForgeHomeResolver.getRuntimeRoot() as source of truth.
  skills-dir: ./data/skills
  # Browser skill persistent profile (keeps login cookies/storage across runs)
  browser:
    profile-dir: ./data/browser-profile
    default-timeout-ms: 30000
    login-timeout-seconds: 300
  # LLM provider configs
  llm:
    default-provider: ark  # 2026-06-05: 切回 ark（5h 配额已重置；ark 的 deepseek-flash/glm-5.1/doubao-lite 是正经配置，judge 用 doubao-lite 非推理能返数字）。短暂切 xiaomi-mimo 是因当时 ark 配额耗尽，现恢复。default-provider 决定 GenerateCandidate(PromptImproverService) + eval judge 等走默认 provider 的组件。
    providers:
      claude:
        type: claude
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: https://api.anthropic.com
        model: claude-sonnet-4-20250514
        models:
          - claude-sonnet-4-20250514
          - claude-opus-4-5-20251001
        # MULTIMODAL-MVP: vision-capable models. FE picker tags these with a
        # "多模态" chip; user can upload images/PDFs when their agent.modelId
        # is one of these. ChatService.runLoop keeps capability check as
        # defense-in-depth (race-condition guard).
        vision-models:
          - claude-sonnet-4-20250514
        context-window-tokens: 200000   # claude-sonnet-4 / claude-3.x = 200K
      deepseek:
        type: deepseek
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model: deepseek-chat
        models:
          - deepseek-chat
          - deepseek-v4-pro
        # context-window-tokens: 64000  # deepseek-chat; resolved automatically via model map if unset
      bailian:
        type: openai
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: https://coding.dashscope.aliyuncs.com
        model: qwen3.5-plus
        models:
          - qwen3.5-plus
          - qwen3-max-2026-01-23
          - qwen3-coder-next
          - qwen3.6-plus
          - glm-5
          - kimi-k2.5
          - MiniMax-M2.5
        # Optional per-provider tuning (defaults: 60s / 1 retry)
        # Stream and non-stream use separate OkHttpClient instances (BUG-E) but currently share
        # this same timeout value; the split lets either path be tuned independently in the future.
        #   - non-stream chat(): readTimeout bounds total response time.
        #   - stream chatStream(): readTimeout bounds inter-chunk idle (qwen thinking + proxy buffering can idle > 60s).
        read-timeout-seconds: 240
        # max-retries: 1              # Non-stream chat() only: retries on SocketTimeoutException.
        #                             # Stream chatStream() does NOT use this; it has a dedicated
        #                             # handshake-phase retry on ConnectException / SSLHandshakeException
        #                             # (2 attempts with 2-5s exponential backoff + jitter).
      xiaomi-mimo:
        type: openai
        # IMPORTANT: do NOT include the `/v1` suffix here — OpenAiProvider hard-codes
        # `baseUrl + "/v1/chat/completions"`. Other openai-compatible providers
        # (deepseek / dashscope / claude) all configure root host only. Doubling
        # `/v1` results in HTTP 404 from upstream openresty.
        api-key: ${XIAOMI_MIMO_API_KEY:}
        base-url: https://token-plan-cn.xiaomimimo.com
        # IMPORTANT: model names MUST be lowercase to match Xiaomi's /v1/models
        # registry. Mixed-case (e.g. "MiMo-V2.5-Pro") is rejected with HTTP 400
        # "Not supported model" by the upstream — confirmed via GET /v1/models.
        model: mimo-v2.5-pro
        models:
          - mimo-v2.5-pro
          - mimo-v2.5
          - mimo-v2.5-tts-voiceclone
          - mimo-v2.5-tts-voicedesign
          - mimo-v2.5-tts
          - mimo-v2-pro
          - mimo-v2-omni
          - mimo-v2-tts
        # MULTIMODAL-MVP: allowlist of vision-capable models. FE picker tags these
        # with a "多模态" chip; users get an enabled upload button when their
        # agent.modelId is one of these. ChatService.runLoop keeps the check as
        # defense-in-depth (race condition guard). Confirmed via session
        # 93415b12 on 2026-05-13 that mimo-v2.5 correctly handles inline image
        # content blocks.
        vision-models:
          - mimo-v2-omni
          - mimo-v2.5
        # Context windows resolved per-model via ModelConfig.KNOWN_MODEL_WINDOWS
        # (V2.5 / V2-Pro = 1M tokens, V2-Omni = 256K, TTS variants = 1M tokenizer-aligned).
        # Note: TTS models (-tts / -tts-voiceclone / -tts-voicedesign) are listed for
        # catalog visibility — chat-completion code path is not the right invocation
        # surface for them; keep them out of agent.modelId until a TTS-aware path exists.
        read-timeout-seconds: 240
      # 火山方舟 Ark（coding 端点，OpenAI 兼容）。base-url 已自带版本段 /api/coding/v3，
      # 所以 chat-path 设 /chat/completions（而非默认 /v1/chat/completions）。
      # 协议族按 model 名前缀自动解析：minimax/doubao/glm/kimi → GENERIC_OPENAI；
      # deepseek-v4-* → DEEPSEEK_V4（Ark 上是 OpenAI 兼容，触碰必让 llm-provider-compat-reviewer 核）。
      ark:
        type: openai
        api-key: ${ARK_API_KEY:}
        base-url: https://ark.cn-beijing.volces.com/api/plan/v3
        chat-path: /chat/completions
        # default model = 该 provider 不指定 model 时的 fallback（eval judge 走这）。
        # 用 doubao-seed-2.0-lite：非推理、maxTokens=16 也能返数字（minimax/glm/kimi 是推理模型，16 token 全烧 reasoning→content 空→judge 解析不出分）。
        model: doubao-seed-2.0-lite
        models:
          - minimax-latest          # 推荐写法，对应 minimax-m2.7
          - doubao-seed-2.0-code
          - doubao-seed-2.0-pro
          - doubao-seed-2.0-lite
          - doubao-seed-code
          - glm-5.1
          - glm-5.2
          - deepseek-v4-flash
          - deepseek-v4-pro
          - kimi-k2.6
        read-timeout-seconds: 240

  # Memory extraction configuration
  memory:
    extraction-mode: rule          # "rule" (Phase 2 rules) or "llm" (Phase 3 LLM extraction)
    # extraction-provider:         # null = use default LLM provider
    # max-conversation-chars: 8000 # truncation limit for LLM input
    extraction:
      idle-window-minutes: 30
      idle-scanner-interval-minutes: 10
      max-unextracted-turns: 30
      cooldown-minutes: 5
      empty-result-cooldown-minutes: 15
    dedup:
      cosine-update-threshold: 0.95
      cosine-merge-threshold: 0.85
    eviction:
      stale-after-days: 30
      archive-after-days: 60
      delete-after-days: 90
      max-active-per-user: 1500
    # MEMORY-DREAM-CONSOLIDATION — nightly cron driven by MemoryConsolidationScheduler
    consolidation:
      # window for picking active users (sessions with a user message in this period)
      active-user-lookback-days: 7
      # gate the cron without restart; default true
      scheduled-enabled: true
    # MEMORY-LLM-SYNTHESIS — two paths exist; ENABLE AT MOST ONE to avoid dual-cron
    # racing the same active-user set and producing duplicate proposals.
    #
    #   V1 (legacy Java)  : LlmMemorySynthesisScheduler @Scheduled(cron="0 30 4 * * *")
    #                       Gated by `scheduled-enabled` below. Kept for fallback /
    #                       debugging when the dogfood path is unavailable. Talks
    #                       directly to the LLM via LlmMemorySynthesizer.
    #
    #   V2 (dogfood, V69) : memory-curator system agent + P12 ScheduledTask
    #                       Configure / toggle in the dashboard /schedules page (the
    #                       V69 migration seeds the row with enabled=false). Drives
    #                       memory-curator tools including transcript dreaming via
    #                       the normal agent loop — same proposal table, just
    #                       different orchestration. This is the preferred path
    #                       going forward.
    #
    # Mutual exclusion: if you flip V1 `scheduled-enabled` true, ALSO disable the
    # `memory-curator nightly` ScheduledTask row (or vice versa). The admin
    # run-once endpoint /api/admin/memory/llm-synthesis/run-once auto-prefers the
    # V2 dogfood path when the seed exists and falls back to V1 only when it doesn't.
    llm-synthesis:
      # optional override; blank → falls back to skillforge.llm.default-provider
      # provider: bailian
      # V1 LEGACY GATE — daily 04:30 cron driven by LlmMemorySynthesisScheduler.
      # Default OFF (D12 first-week observation period). Keep OFF when the V2
      # dogfood ScheduledTask is enabled.
      scheduled-enabled: false
      max-candidates-per-run: 50
      active-user-lookback-days: 7

  # Embedding provider for memory vector search (disabled by default for dev)
  embedding:
    enabled: false
    api-key: ${EMBEDDING_API_KEY:}
    base-url: https://api.openai.com
    model: text-embedding-3-small
    dimension: 1536

# Lifecycle hook configuration (see docs/design-n3-p1.md §1.11/§1.12)
lifecycle:
  hooks:
    # Skills that are NOT allowed to be invoked as lifecycle-hook handlers. Note: only blocks
    # Hook → SkillHandler invocation path; nested Skill calls are NOT blocked (documented limit).
    forbidden-skills:
      - SubAgent
      - TeamCreate
      - TeamSend
      - TeamKill
    agent-authored:
      # Agent-authored hook proposals can always target approved immutable compiled methods
      # via compiled:<id>. Builtin methods must be explicitly allowlisted here before agents
      # may propose bindings to them; default empty keeps V1 compiled-only.
      allowed-builtin-methods: []
    script:
      # Interpreter allow-list. Empty list disables ScriptHandler entirely (recommended for prod).
      allowed-langs:
        - bash
        - node
      # Stdout/stderr capture cap in bytes; anything past this is drained and discarded.
      max-output-bytes: 65536
      # Char length cap on ScriptHandler.scriptBody. Paired with save-time validation in AgentService.
      max-script-body-chars: 4096

# Application-wide settings (P12+: scheduler / channel push uses dashboard-url to build
# clickable links in feishu / telegram messages — must be the operator-facing FE host).
app:
  dashboard-url: ${APP_DASHBOARD_URL:http://localhost:5173}

logging:
  level:
    com.skillforge: DEBUG
