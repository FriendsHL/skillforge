server:
  port: 8080

spring:
  application:
    name: skillforge

  # H2 embedded database (替代 MySQL, 零安装)
  datasource:
    url: jdbc:h2:file:./data/skillforge;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# SkillForge configuration
skillforge:
  # Skill packages storage path
  skills-dir: ./data/skills
  # LLM provider configs
  llm:
    default-provider: openai
    providers:
      claude:
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: https://api.anthropic.com
        model: claude-sonnet-4-20250514
      openai:
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model: deepseek-chat

logging:
  level:
    com.skillforge: DEBUG
