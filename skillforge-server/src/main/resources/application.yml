server:
  port: 8080

spring:
  application:
    name: skillforge

  # H2 embedded database (替代 MySQL, 零安装)
  datasource:
    url: jdbc:h2:file:./data/skillforge;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# SkillForge configuration
skillforge:
  # Skill packages storage path
  skills-dir: ./data/skills
  # Browser skill persistent profile (keeps login cookies/storage across runs)
  browser:
    profile-dir: ./data/browser-profile
    default-timeout-ms: 30000
    login-timeout-seconds: 300
  # LLM provider configs
  llm:
    default-provider: bailian
    providers:
      claude:
        type: claude
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: https://api.anthropic.com
        model: claude-sonnet-4-20250514
      openai:
        type: openai
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model: deepseek-chat
      bailian:
        type: openai
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: https://coding.dashscope.aliyuncs.com
        model: qwen3.5-plus
        # Optional per-provider tuning (defaults: 60s / 1 retry)
        # read-timeout-seconds: 60    # raise for slow models; non-stream chat only
        # max-retries: 1              # retries on SocketTimeoutException only,
        #                             # does NOT apply to streaming (chatStream)

clawhub:
  enabled: true
  base-url: https://clawhub.ai
  install-dir: ./data/skills/clawhub
  # install 操作即使在 auto 模式也强制 ask_user 确认
  require-ask-user: true
  ask-user-timeout-seconds: 600
  http-timeout-ms: 30000
  # 安全检测阈值
  max-zip-entries: 200
  max-uncompressed-bytes: 10485760   # 10 MB
  max-single-entry-bytes: 2097152    # 2 MB
  max-compression-ratio: 100

logging:
  level:
    com.skillforge: DEBUG
