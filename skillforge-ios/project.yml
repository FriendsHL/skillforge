name: SkillForge
options:
  bundleIdPrefix: com.skillforge
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
targets:
  SkillForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkillForge
    info:
      path: SkillForge/App/SkillForgeInfo.plist
      properties:
        CFBundleDisplayName: SkillForge
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: "Scan the SkillForge Dashboard QR code to pair this iPhone."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skillforge.companion.dev
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ""
        Release:
          CODE_SIGN_ENTITLEMENTS: SkillForge/SkillForge.entitlements
          APS_ENVIRONMENT: production
  SkillForgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkillForgeTests
    dependencies:
      - target: SkillForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skillforge.companion.dev.tests
        GENERATE_INFOPLIST_FILE: YES
  SkillForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkillForgeUITests
    dependencies:
      - target: SkillForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skillforge.companion.dev.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SkillForge
