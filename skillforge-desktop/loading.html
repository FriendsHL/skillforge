<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
  <title>SkillForge</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f1115;
      color: #e6e8ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }
    .brand { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
    .hint { font-size: 13px; color: #8a9099; }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #5b8cff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">SkillForge</div>
    <div class="spinner"></div>
    <div class="hint">Starting local server…</div>
  </div>
</body>
</html>
